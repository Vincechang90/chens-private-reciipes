<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陈氏私房菜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.544.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Playfair+Display:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap');

        :root {
            --primary-color: #8B4513;
            --secondary-color: #D2B48C;
            --accent-color: #CD853F;
            --background-color: #FDFBF5;
            --text-color: #3A3A3A;
            --light-text: #6C6C6C;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        .logo-font {
            font-family: 'Ma Shan Zheng', cursive;
        }

        .serif-font {
            font-family: 'Playfair Display', 'Noto Serif SC', serif;
        }

        .hero-section {
            background-image: url('https://p9-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/13ef6b6648814fc7aa70dc11e5b29d6f~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202602231615533C09AAA36CCB64697FDC&rrcfp=f06b921b&x-expires=1774426566&x-signature=4zwqSc63SWKA5LBjZoJoIiL%2F9%2FE%3D');
            background-size: cover;
            background-position: center;
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            position: relative;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 800px;
        }

        .recipe-card {
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.5s ease;
            background: white;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
        }

        .recipe-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #6D340F;
            transform: translateY(-2px);
        }

        .category-btn {
            transition: all 0.3s ease;
            border: 1px solid var(--primary-color);
        }

        .category-btn.active, .category-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .modal-content {
            background-color: var(--background-color);
            border-radius: 0.5rem;
        }

        .form-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(205, 133, 63, 0.25);
        }

        .fade-in {
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header class="bg-white/90 backdrop-blur-sm shadow-sm fixed w-full top-0 z-40">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-3xl md:text-4xl font-bold logo-font text-amber-900">陈氏私房菜</h1>
            <button id="add-recipe-btn" class="btn-primary font-semibold py-2 px-4 rounded-lg flex items-center space-x-2">
                <i data-lucide="plus"></i>
                <span>添加菜谱</span>
            </button>
        </div>
    </header>

    <section class="hero-section mt-16">
        <div class="hero-content fade-in">
            <h2 class="text-4xl md:text-6xl font-bold serif-font mb-4">陈氏私房菜</h2>
            <p class="text-lg md:text-xl mb-8 max-w-2xl mx-auto">探索美食的艺术，记录生活的味道</p>
            <div class="relative max-w-md mx-auto">
                <input type="text" id="search-input" placeholder="搜索您的专属菜谱..." class="w-full py-3 pl-12 pr-4 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-amber-500 shadow-lg logo-font text-xl">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i data-lucide="search" class="text-gray-400"></i>
                </div>
            </div>
        </div>
    </section>

    <main class="container mx-auto px-4 py-8">
        <section class="py-16 container mx-auto px-4">
            <div class="flex flex-wrap gap-4 justify-center">
                <button class="category-btn active bg-transparent text-amber-900 px-8 py-3 rounded-full font-semibold hover:bg-amber-900 hover:text-white transition-colors" data-category="all">全部</button>
                <button class="category-btn bg-transparent text-amber-900 px-8 py-3 rounded-full font-semibold hover:bg-amber-900 hover:text-white transition-colors" data-category="中餐">中餐</button>
                <button class="category-btn bg-transparent text-amber-900 px-8 py-3 rounded-full font-semibold hover:bg-amber-900 hover:text-white transition-colors" data-category="西餐">西餐</button>
                <button class="category-btn bg-transparent text-amber-900 px-8 py-3 rounded-full font-semibold hover:bg-amber-900 hover:text-white transition-colors" data-category="烘焙">烘焙</button>
                <button class="category-btn bg-transparent text-amber-900 px-8 py-3 rounded-full font-semibold hover:bg-amber-900 hover:text-white transition-colors" data-category="饮品">饮品</button>
            </div>
        </section>
        <section id="recipe-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 container mx-auto px-4 pb-24">
            <!-- Recipe cards will be dynamically inserted here -->
        </section>
    </main>

    <footer class="bg-amber-900 text-white text-center py-6 mt-12">
        <p>&copy; 2026 陈氏私房菜. All Rights Reserved.</p>
    </footer>

    <div id="add-recipe-modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 hidden">
        <div class="modal-content bg-white rounded-lg shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center p-6 border-b border-gray-200">
                <h2 class="text-3xl font-bold serif-font text-amber-900">添加新菜谱</h2>
                <button id="close-modal-btn" class="text-gray-500 hover:text-amber-900 transition-colors">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>
            </div>
            <form id="add-recipe-form" class="p-6 md:p-8">
                <div class="mb-4">
                    <label for="recipe-title" class="block text-gray-700 font-semibold mb-3 text-lg">菜名</label>
                    <input type="text" id="recipe-title" name="title" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all duration-300" required>
                </div>
                <div class="mb-6">
                    <label for="recipe-category" class="block text-gray-700 font-semibold mb-3 text-lg">菜系</label>
                    <select id="recipe-category" name="category" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all duration-300" required>
                        <option value="">请选择</option>
                        <option value="中餐">中餐</option>
                        <option value="西餐">西餐</option>
                        <option value="烘焙">烘焙</option>
                        <option value="饮品">饮品</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label for="recipe-tags" class="block text-gray-700 font-semibold mb-3 text-lg">标签 (用逗号分隔)</label>
                    <input type="text" id="recipe-tags" name="tags" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all duration-300">
                </div>
                <div class="mb-6">
                    <label for="recipe-image" class="block text-gray-700 font-semibold mb-3 text-lg">图片</label>
                    <input type="file" id="recipe-image" name="image" accept="image/*" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all duration-300" required>
                </div>
                <div class="mb-6">
                    <label for="recipe-ingredients" class="block text-gray-700 font-semibold mb-3 text-lg">食材 (每行一种)</label>
                    <textarea id="recipe-ingredients" name="ingredients" rows="4" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all duration-300" required></textarea>
                </div>
                <div class="mb-8">
                    <label for="recipe-steps" class="block text-gray-700 font-semibold mb-3 text-lg">做法 (每行一步)</label>
                    <textarea id="recipe-steps" name="steps" rows="6" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all duration-300" required></textarea>
                </div>
                <div class="flex justify-end space-x-4">
                    <button type="button" id="cancel-btn" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-3 px-8 rounded-lg transition duration-300">取消</button>
                    <button type="submit" class="btn-primary font-semibold py-3 px-8 rounded-lg transition duration-300">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div id="view-recipe-modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 hidden">
        <div class="modal-content bg-white rounded-lg shadow-2xl w-full max-w-5xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center p-6 border-b border-gray-200">
                <h2 id="detail-title" class="text-3xl md:text-4xl font-bold serif-font text-amber-900"></h2>
                <button id="close-detail-modal-btn" class="text-gray-500 hover:text-amber-900 transition-colors">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>
            </div>
            <div id="detail-content" class="p-6 md:p-8">
                <!-- Recipe details will be dynamically inserted here -->
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

const recipes = JSON.parse(localStorage.getItem('chensRecipes')) || [
            {
                id: 1,
                title: '宫保鸡丁',
                category: '中餐',
                tags: ['川菜', '鸡肉'],
                ingredients: ['鸡胸肉', '花生米', '干辣椒', '葱', '姜', '蒜', '糖', '醋', '酱油'],
                steps: [
                    '将鸡胸肉切成小丁，用盐、淀粉腌制。',
                    '花生米炒熟备用。',
                    '热锅冷油，下葱姜蒜爆香，加入鸡丁炒至变色。',
                    '加入干辣椒段，翻炒出香味。',
                    '调入糖、醋、酱油，炒匀后撒入花生米和葱段即可。'
                ],
                image: 'https://images.pexels.com/photos/162825/pexels-photo-162825.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1'
            },
            {
                id: 2,
                title: '香煎三文鱼',
                category: '西餐',
                tags: ['海鲜', '减脂'],
                ingredients: ['三文鱼', '橄榄油', '盐', '黑胡椒', '柠檬'],
                steps: [
                    '三文鱼洗净，用厨房纸擦干。',
                    '撒上盐和黑胡椒腌制15分钟。',
                    '平底锅烧热，倒入橄榄油。',
                    '将三文鱼皮朝下放入锅中，中火煎至皮酥脆。',
                    '翻面，煎至鱼肉呈半透明粉色。',
                    '挤上柠檬汁即可享用。'
                ],
                image: 'https://images.pexels.com/photos/941861/pexels-photo-941861.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1'
            }
        ];

        const recipeGrid = document.getElementById('recipe-grid');
        const searchInput = document.getElementById('search-input');
        const categoryBtns = document.querySelectorAll('.category-btn');

        let currentCategory = 'all';
        let currentSearchTerm = '';

        function saveRecipes() {
            localStorage.setItem('chensRecipes', JSON.stringify(recipes));
        }

        function renderRecipes() {
            recipeGrid.innerHTML = '';
            const filteredRecipes = recipes.filter(recipe => {
                const matchesCategory = currentCategory === 'all' || recipe.category === currentCategory;
                const matchesSearch = recipe.title.toLowerCase().includes(currentSearchTerm.toLowerCase()) ||
                                    recipe.tags.some(tag => tag.toLowerCase().includes(currentSearchTerm.toLowerCase()));
                return matchesCategory && matchesSearch;
            });

            if (filteredRecipes.length === 0) {
                recipeGrid.innerHTML = `<p class="text-gray-500 col-span-full text-center">没有找到相关菜谱。</p>`;
                return;
            }

            filteredRecipes.forEach(recipe => {
                const recipeCard = `
                    <div class="recipe-card fade-in">
                        <img src="${recipe.image}" alt="${recipe.title}" class="w-full h-64 object-cover">
                        <div class="p-6">
                            <h3 class="text-2xl font-bold serif-font mb-3 text-amber-900">${recipe.title}</h3>
                            <div class="flex flex-wrap items-center gap-2 mb-4">
                                <span class="bg-amber-50 text-amber-800 text-xs font-medium px-3 py-1 rounded-full border border-amber-200">${recipe.category}</span>
                                ${recipe.tags.map(tag => `<span class="bg-gray-50 text-gray-700 text-xs font-medium px-3 py-1 rounded-full border border-gray-200">${tag}</span>`).join('')}
                            </div>
                            <button class="view-recipe-btn w-full btn-primary font-semibold py-2 px-4 rounded-lg transition duration-300 mt-2" data-id="${recipe.id}">
                                查看详情
                            </button>
                        </div>
                    </div>
                `;
                recipeGrid.innerHTML += recipeCard;
            });
        }

        searchInput.addEventListener('input', (e) => {
            currentSearchTerm = e.target.value;
            renderRecipes();
        });

        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => {
                    b.classList.remove('active', 'bg-amber-900', 'text-white');
                    b.classList.add('bg-transparent', 'text-amber-900');
                });
                btn.classList.remove('bg-transparent', 'text-amber-900');
                btn.classList.add('active', 'bg-amber-900', 'text-white');
                currentCategory = btn.dataset.category;
                renderRecipes();
            });
        });

        const addRecipeBtn = document.getElementById('add-recipe-btn');
        const addRecipeModal = document.getElementById('add-recipe-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const addRecipeForm = document.getElementById('add-recipe-form');

        addRecipeBtn.addEventListener('click', () => {
            addRecipeModal.classList.remove('hidden');
        });

        function closeModal() {
            addRecipeModal.classList.add('hidden');
            addRecipeForm.reset();
        }

        closeModalBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);

        addRecipeForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(addRecipeForm);
            const imageFile = formData.get('image');
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const newRecipe = {
                    id: Date.now(),
                    title: formData.get('title'),
                    category: formData.get('category'),
                    tags: formData.get('tags').split(',').map(tag => tag.trim()).filter(tag => tag),
                    image: event.target.result,
                    ingredients: formData.get('ingredients').split('\n').filter(ing => ing.trim()),
                    steps: formData.get('steps').split('\n').filter(step => step.trim())
                };
                recipes.push(newRecipe);
                saveRecipes();
                renderRecipes();
                closeModal();
                lucide.createIcons();
            };
            reader.readAsDataURL(imageFile);
        });

        renderRecipes();

        const viewRecipeModal = document.getElementById('view-recipe-modal');
        const closeDetailModalBtn = document.getElementById('close-detail-modal-btn');
        const detailTitle = document.getElementById('detail-title');
        const detailContent = document.getElementById('detail-content');

        closeDetailModalBtn.addEventListener('click', () => {
            viewRecipeModal.classList.add('hidden');
        });

        recipeGrid.addEventListener('click', (e) => {
            if (e.target.classList.contains('view-recipe-btn')) {
                const recipeId = parseInt(e.target.dataset.id);
                const recipe = recipes.find(r => r.id === recipeId);
                if (recipe) {
                    detailTitle.textContent = recipe.title;
                    detailContent.innerHTML = `
                        <img src="${recipe.image}" alt="${recipe.title}" class="w-full h-80 object-cover rounded-xl mb-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                            <div>
                                <h3 class="text-2xl font-bold serif-font mb-6 text-amber-900 border-b-2 border-amber-200 pb-2 inline-block">食材</h3>
                                <ul class="list-disc pl-5 space-y-3 text-lg">
                                    ${recipe.ingredients.map(ing => `<li>${ing}</li>`).join('')}
                                </ul>
                            </div>
                            <div>
                                <h3 class="text-2xl font-bold serif-font mb-6 text-amber-900 border-b-2 border-amber-200 pb-2 inline-block">做法</h3>
                                <ol class="list-decimal pl-5 space-y-4 text-lg">
                                    ${recipe.steps.map(step => `<li>${step}</li>`).join('')}
                                </ol>
                            </div>
                        </div>
                        <div class="mt-12 flex justify-end space-x-4">
                            <button class="delete-recipe-btn bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-6 rounded-lg transition duration-300" data-id="${recipe.id}">
                                删除菜谱
                            </button>
                            <button class="edit-recipe-btn bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition duration-300" data-id="${recipe.id}">
                                编辑菜谱
                            </button>
                        </div>
                    `;
                    viewRecipeModal.classList.remove('hidden');
                    lucide.createIcons();
                }
            }
        });

        viewRecipeModal.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-recipe-btn')) {
                const recipeId = parseInt(e.target.dataset.id);
                if (confirm('确定要删除这道菜谱吗？')) {
                    const index = recipes.findIndex(r => r.id === recipeId);
                    if (index > -1) {
                        recipes.splice(index, 1);
                        saveRecipes();
                        renderRecipes();
                        viewRecipeModal.classList.add('hidden');
                    }
                }
            }
            if (e.target.classList.contains('edit-recipe-btn')) {
                const recipeId = parseInt(e.target.dataset.id);
                const recipe = recipes.find(r => r.id === recipeId);
                if (recipe) {
                    viewRecipeModal.classList.add('hidden');
                    document.getElementById('recipe-title').value = recipe.title;
                    document.getElementById('recipe-category').value = recipe.category;
                    document.getElementById('recipe-tags').value = recipe.tags.join(', ');
                    // For edit, we can't set the file input directly. We'll handle it in the UI.
                    // document.getElementById('recipe-image').value = recipe.image;
                    document.getElementById('recipe-ingredients').value = recipe.ingredients.join('\n');
                    document.getElementById('recipe-steps').value = recipe.steps.join('\n');
                    addRecipeModal.classList.remove('hidden');
                    
                    // Remove the old recipe so it can be replaced by the edited one
                    const index = recipes.findIndex(r => r.id === recipeId);
                    recipes.splice(index, 1);
                    saveRecipes();
                }
            }
        });

    </script>
</body>
</html>
